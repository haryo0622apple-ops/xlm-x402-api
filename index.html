<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>XLM AI分析</title>
</head>

<body>

<h1>XLM AI分析</h1>

<p>価格: <span id="price">取得中...</span></p>
<p>RSI: <span id="rsi">取得中...</span></p>
<p>ROI: <span id="roi">取得中...</span></p>
<p>判断: <span id="signal">取得中...</span></p>

<script>

fetch("https://xlm-x402-api-production.up.railway.app")
.then(res => res.json())
.then(data => {

document.getElementById("price").innerText = data.price + " USD"
document.getElementById("signal").innerText = data.signal

})

</script>

</body>
</html>
